<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Navigation Responsive</title>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <!-- Contenedor del Nav -->
    <!-- 
        - grid-cols-2: 2 columnas en móvil
        - sm:flex: pasa a flexbox en pantallas medianas
        - w-full: ocupa todo el ancho disponible
        - max-w-max: en pantallas grandes no se estira infinitamente
    -->
    <nav class="grid grid-cols-2 sm:flex bg-blue-800 rounded-xl p-1.5 gap-1 w-full max-w-2xl mx-auto shadow-lg text-white">
        
        <button onclick="switchView('list')" id="btn-list" 
            class="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 rounded-lg transition hover:bg-blue-700 active:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400 bg-blue-700/50">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list"><path d="M3 5h.01"></path><path d="M3 12h.01"></path><path d="M3 19h.01"></path><path d="M8 5h13"></path><path d="M8 12h13"></path><path d="M8 19h13"></path></svg>
            <span class="text-sm font-medium">Lista</span>
        </button>

        <button onclick="switchView('grid')" id="btn-grid" 
            class="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 rounded-lg transition hover:bg-blue-700 active:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-grid"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg>
            <span class="text-sm font-medium">Cards</span>
        </button>

        <button onclick="switchView('calendar')" id="btn-calendar" 
            class="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 rounded-lg transition hover:bg-blue-700 active:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path></svg>
            <span class="text-sm font-medium">Calendario</span>
        </button>

        <button onclick="switchView('map')" id="btn-map" 
            class="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 rounded-lg transition hover:bg-blue-700 active:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"></path><path d="M15 5.764v15"></path><path d="M9 3.236v15"></path></svg>
            <span class="text-sm font-medium">Mapa</span>
        </button>

    </nav>

    <script>
        function switchView(view) {
            console.log("Cambiando a vista:", view);
            // Lógica para resaltar el botón activo
            const buttons = document.querySelectorAll('nav button');
            buttons.forEach(btn => btn.classList.remove('bg-blue-700/50'));
            document.getElementById('btn-' + view).classList.add('bg-blue-700/50');
        }
    </script>

</body>
</html>
