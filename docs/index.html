<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Asturias 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- FullCalendar para la vista de calendario -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #map { height: 400px; border-radius: 0.75rem; }
        .fc-event { cursor: pointer; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        #loading-overlay { backdrop-filter: blur(4px); }
    </style>



<!-- Enlace al archivo de manifiesto -->
<link rel="manifest" href="./manifest.webmanifest">

<!-- Meta etiquetas adicionales para compatibilidad con iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AsturFest">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">


</head>
<body class="bg-gray-50 min-h-screen text-gray-900 font-sans">

    <!-- Indicador de carga -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 z-[100] flex items-center justify-center hidden">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700 mb-2"></div>
            <p class="text-blue-700 font-medium">Cargando eventos...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-blue-700 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i data-lucide="calendar-days"></i> Asturias Eventos 2026
            </h1>
 <nav class="grid grid-cols-4 sm:flex bg-blue-800 rounded-xl p-1.5 gap-1 w-full max-w-2xl mx-auto shadow-lg text-white">
        
        <button onclick="switchView('list')" id="btn-list" 
            class="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 rounded-lg transition hover:bg-blue-700 active:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400 bg-blue-700/50">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list"><path d="M3 5h.01"></path><path d="M3 12h.01"></path><path d="M3 19h.01"></path><path d="M8 5h13"></path><path d="M8 12h13"></path><path d="M8 19h13"></path></svg>
            <span class="text-sm font-medium"></span>
        </button>

        <button onclick="switchView('grid')" id="btn-grid" 
            class="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 rounded-lg transition hover:bg-blue-700 active:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-grid"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg>
            <span class="text-sm font-medium"></span>
        </button>

        <button onclick="switchView('calendar')" id="btn-calendar" 
            class="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 rounded-lg transition hover:bg-blue-700 active:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path></svg>
            <span class="text-sm font-medium"></span>
        </button>

        <button onclick="switchView('map')" id="btn-map" 
            class="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 rounded-lg transition hover:bg-blue-700 active:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"></path><path d="M15 5.764v15"></path><path d="M9 3.236v15"></path></svg>
            <span class="text-sm font-medium"></span>
        </button>

    </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-2 py-6">
        
        <!-- Filtros -->
        <section class="bg-white p-2 rounded-xl shadow-sm mb-8 border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Buscar</label>
                    <input type="text" id="search-name" placeholder="Nombre, lugar, concejo..." class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
                    <select id="filter-category" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none">
                        <option value="">Todas</option>
                        <option value="Cultura">Cultura</option>
                        <option value="Música">Música</option>
                        <option value="Gastronomía">Gastronomía</option>
                        <option value="Deporte">Deporte</option>
                        <option value="Ocio">Ocio</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Desde</label>
                    <input type="date" id="filter-start" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Hasta</label>
                    <input type="date" id="filter-end" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none">
                </div>
            </div>
            <div class="mt-4 flex flex-wrap gap-3 items-center justify-between">
                <div class="flex gap-2">
                    <button onclick="getLocation()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition">
                        <i data-lucide="map-pin"></i> Cerca de mí
                    </button>
                    <button onclick="togglePastEvents()" id="btn-past" class="border border-gray-300 hover:bg-gray-100 px-4 py-2 rounded-lg transition">
                        Mostrar pasados
                    </button>
                </div>
                <button onclick="resetFilters()" class="text-blue-600 font-medium hover:underline">Limpiar filtros</button>
            </div>
        </section>

        <!-- Contenedores de Vistas -->
        <div id="view-list" class="space-y-4"></div>
        <div id="view-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
        <div id="view-calendar" class="bg-white p-4 rounded-xl shadow-sm hidden">
            <div id="calendar-el"></div>
        </div>
        <div id="view-map" class="hidden">
            <div id="map" class="shadow-md"></div>
        </div>

        <!-- Mensajes de Error o Sin Resultados -->
        <div id="no-results" class="hidden text-center py-20 text-gray-500">
            <i data-lucide="search-x" class="mx-auto w-12 h-12 mb-4 text-gray-300"></i>
            <p class="text-xl">No hemos encontrado eventos con esos criterios.</p>
        </div>

        <div id="error-message" class="hidden text-center py-20 text-red-500">
            <i data-lucide="alert-circle" class="mx-auto w-12 h-12 mb-4 text-red-300"></i>
            <p class="text-xl font-bold">Error al cargar los datos</p>
            <p id="error-details">No se pudo cargar la base de datos de eventos.</p>
        </div>
    </main>

    <!-- Modal de Detalles -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-gray-100 hover:bg-gray-200 p-2 rounded-full z-10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // --- ESTADO GLOBAL ---
        let eventos = [];
        let currentView = 'list';
        let showPast = false;
        let map = null;
        let calendar = null;
        let userLocation = null;
        const now = new Date();

        // --- CARGA DE DATOS ---
        async function fetchEventos() {
            const loading = document.getElementById('loading-overlay');
            const errorView = document.getElementById('error-message');
            const errorDetails = document.getElementById('error-details');
            loading.classList.remove('hidden');
            
            try {
                // Ajuste de ruta: Usamos una ruta relativa más segura o absoluta según el origen
                const jsonPath = './assets/data/datos.json';
                
                const response = await fetch(jsonPath);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                eventos = await response.json();
                
                // Normalizar IDs
                eventos = eventos.map((ev, index) => ({
                    ...ev,
                    id: ev.id || index + 1
                }));

                render();
                if (currentView === 'calendar' && calendar) calendar.refetchEvents();
            } catch (error) {
                console.error("Error cargando JSON:", error);
                errorView.classList.remove('hidden');
                errorDetails.innerText = `Error: ${error.message}. Asegúrate de que assets/json/datos.json existe y es accesible.`;
            } finally {
                loading.classList.add('hidden');
            }
        }

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            lucide.createIcons();
            initMap();
            initCalendar();
            
            // Cargar datos
            fetchEventos();
            
            // Listeners para filtros
            document.querySelectorAll('input, select').forEach(el => {
                el.addEventListener('change', render);
                if (el.tagName === 'INPUT' && el.type === 'text') {
                    el.addEventListener('keyup', render);
                }
            });
        };

        function switchView(view) {
            currentView = view;
            ['list', 'grid', 'calendar', 'map'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                const btn = document.getElementById(`btn-${v}`);
                if (el) el.classList.toggle('hidden', v !== view);
                if (btn) btn.classList.toggle('bg-blue-600', v === view);
            });
            
            if (view === 'calendar' && calendar) {
                calendar.render();
                updateCalendarData(getFilteredEvents());
            }
            if (view === 'map' && map) {
                setTimeout(() => map.invalidateSize(), 200);
            }
            render();
        }

        function togglePastEvents() {
            showPast = !showPast;
            const btn = document.getElementById('btn-past');
            if (btn) {
                btn.innerText = showPast ? 'Ocultar pasados' : 'Mostrar pasados';
                btn.classList.toggle('bg-blue-100', showPast);
                btn.classList.toggle('text-blue-700', showPast);
            }
            render();
        }

        function initMap() {
            const mapEl = document.getElementById('map');
            if (!mapEl) return;
            map = L.map('map').setView([43.36, -5.84], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        function initCalendar() {
            const calendarEl = document.getElementById('calendar-el');
            if (!calendarEl) return;
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                firstDay: 1,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                eventClick: (info) => openModal(info.event.id)
            });
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = [pos.coords.latitude, pos.coords.longitude];
                    render();
                }, (err) => {
                    console.warn("Geolocalización desactivada:", err);
                });
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function resetFilters() {
            document.getElementById('search-name').value = '';
            document.getElementById('filter-category').value = '';
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';
            userLocation = null;
            render();
        }

        // --- LÓGICA DE FILTRADO ---
        function getFilteredEvents() {
            const search = (document.getElementById('search-name')?.value || '').toLowerCase();
            const category = document.getElementById('filter-category')?.value || '';
            const fStart = document.getElementById('filter-start')?.value;
            const fEnd = document.getElementById('filter-end')?.value;

            return eventos.filter(ev => {
                const dateStart = new Date(ev.fecha_inicio);
                const dateEnd = new Date(ev.fecha_fin);
                
                if (!showPast && dateEnd < now) return false;

                const matchText = (ev.titulo || '').toLowerCase().includes(search) || 
                                 (ev.lugar || '').toLowerCase().includes(search) || 
                                 (ev.concejo || '').toLowerCase().includes(search);
                
                const matchCat = category === "" || ev.categoria === category;

                let matchRange = true;
                if (fStart) matchRange = matchRange && dateStart >= new Date(fStart);
                if (fEnd) matchRange = matchRange && dateStart <= new Date(fEnd);

                let matchDist = true;
                if (userLocation && ev.gtp) {
                    const coords = Array.isArray(ev.gtp) ? ev.gtp : ev.gtp.split(',').map(Number);
                    const dist = getDistance(userLocation[0], userLocation[1], coords[0], coords[1]);
                    matchDist = dist < 30;
                }

                return matchText && matchCat && matchRange && matchDist;
            }).sort((a, b) => new Date(a.fecha_inicio) - new Date(b.fecha_inicio));
        }

        // --- RENDERIZADO DE VISTAS ---
        function render() {
            if (eventos.length === 0) return;
            const filtered = getFilteredEvents();

            updateListView(filtered);
            updateGridView(filtered);
            updateCalendarData(filtered);
            updateMapMarkers(filtered);

            const noResults = document.getElementById('no-results');
            if (noResults) noResults.classList.toggle('hidden', filtered.length > 0);
            lucide.createIcons();
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('es-ES', { 
                day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' 
            });
        }

        function updateListView(data) {
            const container = document.getElementById('view-list');
            if (!container) return;
            container.innerHTML = data.map(ev => `
                <div onclick="openModal(${ev.id})" class="bg-white p-4 rounded-xl shadow-sm border border-transparent hover:border-blue-300 transition cursor-pointer flex gap-4 items-center">
                    <img src="${ev.portada}" class="w-20 h-20 rounded-lg object-cover bg-gray-100" onerror="this.src='https://via.placeholder.com/150?text=Asturias'" alt="${ev.titulo}">
                    <div class="flex-1">
                        <h3 class="font-bold text-lg leading-tight">${ev.titulo}</h3>
                        <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500 mt-1">
                            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${formatDate(ev.fecha_inicio)}</span>
                            <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${ev.concejo}</span>
                            <span class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded font-semibold uppercase tracking-wider text-[10px]">${ev.categoria || 'Evento'}</span>
                        </div>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <span class="font-bold text-blue-600 text-sm">${ev.gratuito}</span>
                        <i data-lucide="chevron-right" class="text-gray-300 mt-1"></i>
                    </div>
                </div>
            `).join('');
        }

        function updateGridView(data) {
            const container = document.getElementById('view-grid');
            if (!container) return;
            container.innerHTML = data.map(ev => `
                <div onclick="openModal(${ev.id})" class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition cursor-pointer border border-gray-100 group">
                    <div class="relative h-48 overflow-hidden bg-gray-100">
                        <img src="${ev.portada}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='https://via.placeholder.com/400x250?text=Asturias'" alt="${ev.titulo}">
                        <span class="absolute top-2 right-2 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[10px] font-bold shadow-sm uppercase">${ev.categoria || 'Evento'}</span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-xl mb-2 line-clamp-1">${ev.titulo}</h3>
                        <p class="text-sm text-gray-500 mb-4 line-clamp-2">${ev.descripcion}</p>
                        <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-50">
                            <span class="text-xs font-medium text-gray-600 flex items-center gap-1">
                                <i data-lucide="map-pin" class="w-3 h-3"></i> ${ev.concejo}
                            </span>
                            <span class="text-blue-600 font-bold">${ev.gratuito}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateCalendarData(data) {
            if (!calendar) return;
            calendar.removeAllEvents();
            calendar.addEventSource(data.map(ev => ({
                id: ev.id,
                title: ev.titulo,
                start: ev.fecha_inicio,
                end: ev.fecha_fin,
                backgroundColor: ev.categoria === 'Música' ? '#ef4444' : '#3b82f6',
                borderColor: 'transparent'
            })));
        }

        function updateMapMarkers(data) {
            if (!map) return;
            map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
            data.forEach(ev => {
                if (ev.gtp) {
                    const coords = Array.isArray(ev.gtp) ? ev.gtp : ev.gtp.split(',').map(Number);
                    L.marker(coords).addTo(map)
                        .bindPopup(`
                            <div class="p-1">
                                <p class="font-bold text-sm">${ev.titulo}</p>
                                <p class="text-xs text-gray-500">${ev.concejo}</p>
                                <button onclick="openModal(${ev.id})" class="text-blue-600 text-xs font-bold mt-2 underline">Ver detalles</button>
                            </div>
                        `);
                }
            });
        }

        // --- MODAL Y COMPARTIR ---
        function openModal(id) {
            const ev = eventos.find(e => e.id == id);
            if (!ev) return;
            
            const content = document.getElementById('modal-content');
            if (!content) return;
            
            const textToShare = encodeURIComponent(`¡Mira este evento en Asturias! ${ev.titulo} el ${formatDate(ev.fecha_inicio)} en ${ev.lugar}. Más info: ${ev.web_url}`);
            const wsLink = `https://wa.me/?text=${textToShare}`;
            
            const startStr = ev.fecha_inicio.replace(/-|:|\.\d\d\d/g,"");
            const endStr = ev.fecha_fin.replace(/-|:|\.\d\d\d/g,"");
            const gCalLink = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.titulo)}&dates=${startStr}/${endStr}&details=${encodeURIComponent(ev.descripcion)}&location=${encodeURIComponent(ev.direccion + ", " + ev.concejo)}`;

            content.innerHTML = `
                <div class="relative bg-gray-100 min-h-[200px]">
                    <img src="${ev.portada}" class="w-full h-64 object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=Asturias'" alt="${ev.titulo}">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 p-6">
                        <span class="bg-blue-600 text-white px-2 py-0.5 rounded text-[10px] font-bold uppercase mb-2 inline-block">${ev.categoria || 'Evento'}</span>
                        <h2 class="text-2xl font-bold text-white leading-tight">${ev.titulo}</h2>
                    </div>
                </div>
                <div class="p-6 md:p-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-gray-600">
                        <div class="space-y-4">
                            <div class="flex items-start gap-3">
                                <i data-lucide="calendar" class="w-5 h-5 text-blue-600 mt-0.5"></i>
                                <div>
                                    <p class="text-xs font-bold text-gray-400 uppercase">Cuándo</p>
                                    <p class="text-sm font-medium text-gray-800">${formatDate(ev.fecha_inicio)}</p>
                                    <p class="text-xs text-gray-500">Hasta: ${formatDate(ev.fecha_fin)}</p>
                                </div>
                            </div>
                            <div class="flex items-start gap-3">
                                <i data-lucide="map-pin" class="w-5 h-5 text-blue-600 mt-0.5"></i>
                                <div>
                                    <p class="text-xs font-bold text-gray-400 uppercase">Dónde</p>
                                    <p class="text-sm font-medium text-gray-800">${ev.lugar}</p>
                                    <p class="text-xs text-gray-500">${ev.direccion}, ${ev.concejo}</p>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-4">
                             <div class="flex items-start gap-3">
                                <i data-lucide="ticket" class="w-5 h-5 text-blue-600 mt-0.5"></i>
                                <div>
                                    <p class="text-xs font-bold text-gray-400 uppercase">Entrada</p>
                                    <p class="text-sm font-bold text-blue-600">${ev.gratuito}</p>
                                </div>
                            </div>
                            <div class="flex items-start gap-3">
                                <i data-lucide="tag" class="w-5 h-5 text-blue-600 mt-0.5"></i>
                                <div>
                                    <p class="text-xs font-bold text-gray-400 uppercase">Tipo</p>
                                    <p class="text-sm font-medium text-gray-800">${ev.tipo}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="prose prose-sm max-w-none text-gray-700 mb-8 leading-relaxed">
                        <h4 class="text-gray-900 font-bold mb-2 border-b border-gray-100 pb-2">Sobre este evento</h4>
                        <p>${ev.descripcion}</p>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3">
                        <a href="${ev.web_url}" target="_blank" class="flex-1 bg-blue-600 text-white py-3 px-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-blue-700 transition shadow-sm">
                            <i data-lucide="external-link" class="w-4 h-4"></i> Web Oficial
                        </a>
                        <button onclick="window.open('${wsLink}', '_blank')" class="bg-green-500 text-white py-3 px-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-green-600 transition shadow-sm">
                            <i data-lucide="message-circle" class="w-4 h-4"></i> WhatsApp
                        </button>
                        <a href="${gCalLink}" target="_blank" class="flex-1 border border-gray-200 py-3 px-4 rounded-xl font-bold text-gray-700 flex items-center justify-center gap-2 hover:bg-gray-50 transition">
                            <i data-lucide="calendar-plus" class="w-4 h-4"></i> Google
                        </a>
                    </div>
                </div>
            `;
            
            document.getElementById('modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) closeModal();
        }
    </script>


<!-- llamada al Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((registration) => {
          console.log('Service Worker registrado con éxito:', registration.scope);
        })
        .catch((error) => {
          console.log('Fallo en el registro del Service Worker:', error);
        });
    });
  }
</script>
</body>
</html>
